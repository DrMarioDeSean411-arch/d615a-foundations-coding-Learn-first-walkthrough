<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D615A · Foundations of Coding — Learn</title>
<style>
  :root{
    --bg:#f5f5f3; --card:#fff; --line:#e0ddd6;
    --ink:#1f1f1d; --label:#9b9b97; --label2:#6b6b67;
    --green:#1D9E75; --red:#A32D2D;
    --c1:#2D6CA3; --c2:#B8722E; --c3:#6B4C9A; --mix:#3a3a37;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .shell{max-width:860px;margin:0 auto;padding:20px 16px 64px;}
  code, pre, .mono{font-family:"SF Mono",Menlo,Consolas,monospace;}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .brand{font-size:15px;font-weight:700;letter-spacing:.2px;}
  .brand small{display:block;font-weight:500;color:var(--label2);font-size:11.5px;margin-top:2px;}
  .pills{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{border:0.5px solid var(--line);background:#fff;border-radius:999px;padding:5px 11px;
    font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:box-shadow .15s;}
  .pill:hover{box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .pill.active{background:var(--dot,#333);color:#fff;border-color:transparent;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dot,#999);}
  .pill.active .dot{background:#fff;}

  /* scoreboard */
  .scoreboard{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
  .stat{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;}
  .stat .n{font-size:19px;font-weight:700;}
  .stat .l{font-size:10px;color:var(--label);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
  @media(max-width:600px){.scoreboard{grid-template-columns:repeat(3,1fr);}}

  /* progress bar */
  .progwrap{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:16px;}
  .progtop{display:flex;justify-content:space-between;font-size:11.5px;color:var(--label2);margin-bottom:6px;}
  .progtrack{height:6px;border-radius:99px;background:#ece9e2;overflow:hidden;}
  .progfill{height:100%;background:var(--green);border-radius:99px;transition:width .3s;}

  /* section nav */
  .secnav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .secbtn{flex:1;min-width:140px;background:var(--card);border:0.5px solid var(--line);border-radius:12px;
    padding:12px;cursor:pointer;text-align:left;transition:transform .1s;}
  .secbtn:hover{transform:translateY(-1px);}
  .secbtn .t{font-size:13px;font-weight:700;}
  .secbtn .s{font-size:11px;color:var(--label);margin-top:3px;}
  .secbtn.on{border-color:var(--dot,#333);box-shadow:0 0 0 1px var(--dot,#333) inset;}

  /* topic tab row */
  .tabrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
  .tab{flex:0 0 auto;border:0.5px solid var(--line);background:var(--card);border-radius:10px;
    padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--label2);white-space:nowrap;}
  .tab.on{background:var(--ink);color:#fff;border-color:transparent;}
  .tab.done{color:var(--green);}
  .tab.on.done{color:#fff;}

  /* cards */
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:12px;padding:18px 18px 20px;margin-bottom:14px;}
  .card h2{font-size:17px;margin:0 0 4px;}
  .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--label);font-weight:700;margin-bottom:6px;}
  .card p{font-size:13.5px;line-height:1.62;color:#3a3a37;margin:0 0 12px;}
  .card p:last-child{margin-bottom:0;}
  ul.teach{margin:0 0 12px;padding-left:19px;}
  ul.teach li{font-size:13.5px;line-height:1.6;color:#3a3a37;margin-bottom:5px;}

  pre.codebox{background:#242320;color:#e9e6dd;border-radius:9px;padding:13px 14px;font-size:12.5px;
    line-height:1.55;overflow-x:auto;margin:0 0 10px;}
  .comment{color:#8b8a80;}

  .examplebox{border:0.5px dashed var(--line);border-radius:10px;padding:14px;margin-bottom:12px;background:#fbfaf8;}
  .examplebox .tag{font-size:10.5px;font-weight:700;color:var(--label2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}

  /* mini exercise / grader */
  .exwrap{border:0.5px solid var(--line);border-radius:10px;padding:14px;margin-bottom:6px;background:#fcfcfb;}
  .exwrap .tag{font-size:10.5px;font-weight:700;color:var(--c2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
  .exwrap textarea{width:100%;min-height:76px;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;
    border:0.5px solid var(--line);border-radius:8px;padding:9px 10px;resize:vertical;background:#fff;color:var(--ink);}
  .exgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
  @media(max-width:560px){.exgrid{grid-template-columns:1fr;}}
  .exlabel{font-size:10.5px;color:var(--label2);font-weight:600;margin-bottom:4px;display:block;}
  .exrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .btn{border:none;border-radius:8px;padding:9px 15px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--ink);color:#fff;}
  .btn.ghost{background:transparent;color:var(--label2);border:0.5px solid var(--line);}
  .exresult{font-size:12.5px;font-weight:700;padding:6px 0;}
  .exresult.ok{color:var(--green);}
  .exresult.no{color:var(--red);}
  .hintbox{font-size:12px;color:var(--label2);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--line);}
  details.solution{margin-top:8px;font-size:12.5px;}
  details.solution summary{cursor:pointer;font-weight:700;color:var(--label2);font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;}
  details.solution pre{margin-top:8px;}
  .concepts{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
  .chip{font-size:10px;background:#eee9df;color:var(--label2);border-radius:999px;padding:3px 9px;font-weight:600;}

  /* knowledge check */
  .qhead{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .diff{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;}
  .diff.easy{background:#e4f3ec;color:var(--green);}
  .diff.med{background:#f6ecdd;color:var(--c2);}
  .diff.hard{background:#f3e3e3;color:var(--red);}
  .opt{display:block;width:100%;text-align:left;border:0.5px solid var(--line);background:#fff;border-radius:9px;
    padding:10px 12px;font-size:13px;margin-bottom:7px;cursor:pointer;color:var(--ink);}
  .opt:hover{background:#faf9f6;}
  .opt.correct{border-color:var(--green);background:#eef8f3;color:#0f6b4e;font-weight:600;}
  .opt.wrong{border-color:var(--red);background:#faeeee;color:#7c2323;font-weight:600;}
  .opt[disabled]{cursor:default;}
  .feedback{margin-top:8px;font-size:12.5px;line-height:1.55;padding:10px 12px;border-radius:9px;background:#f7f6f2;}
  .feedback .lbl{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:3px;}
  .feedback.rationale .lbl{color:var(--green);}
  .feedback.misconception .lbl{color:var(--red);}

  .revrow{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
  .revbtn{border:0.5px solid var(--line);background:#fff;border-radius:9px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .revbtn.done{border-color:var(--green);color:var(--green);}
  .navrow{display:flex;justify-content:space-between;margin-top:6px;}
  .navrow button{background:var(--card);border:0.5px solid var(--line);border-radius:9px;padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .navrow button:disabled{opacity:.35;cursor:default;}

  footer{text-align:center;font-size:11px;color:var(--label);margin-top:20px;}
</style>
</head>

        "A program that runs the same instructions in the same order every time is only useful for a narrow set of problems. Conditionals (`if` / `elif` / `else`) let a program pick which block of code to run based on a boolean condition, and loops (`while`, `for`) let it repeat a block until a condition changes. Python defines each block by indentation rather than braces, so consistent, correct indentation is part of the syntax itself, not just a style preference.",

        { stem:"A function is defined `def greet(name=\"friend\"): return \"Hi \" + name`. What does `greet()` (called with no argument) return?", diff:"med", type:"mc",
          opts:["An error, since name has no value","\"Hi friend\", because the default parameter value is used when no argument is supplied","\"Hi None\"","\"Hi \" with nothing appended"],
          ans:1, rationale:"A default parameter value is used whenever the caller omits that argument. It only applies when the argument is missing — passing any value, even an empty string, would override the default.",
          misconception:"Assuming a missing argument always produces an error rather than falling back to a declared default, or assuming defaults apply even when a value was explicitly passed." },
        { stem:"A recursive function calls itself but has no base case — no condition under which it stops calling itself. What happens when it runs in Python?", diff:"med", type:"mc",
          opts:["It runs once and returns normally","It calls itself repeatedly until Python raises a RecursionError for exceeding the maximum recursion depth","Python automatically detects the missing base case and stops safely","Recursion without a base case is a SyntaxError"],
          ans:1, rationale:"Without a base case, a recursive function has no condition that ever stops it from calling itself again. Each call adds another frame to the call stack until Python's recursion limit is exceeded and it raises a RecursionError.",
          misconception:"Assuming Python will detect an infinite recursive pattern and intervene gracefully — it simply keeps calling until the interpreter's recursion limit is hit and raises an explicit error." },
        { stem:"A variable assigned inside a function body — is it accessible from code outside that function?", diff:"easy", type:"mc",
          opts:["Yes, all variables are accessible everywhere in the program","No, a variable assigned inside a function is local to that function and doesn't exist outside its body once the function returns","Only if the function has a return statement","Only if the variable is assigned first in the file"],
          ans:1, rationale:"Local variables exist only within the scope they're assigned in. Once a function finishes executing, its local variables are gone; outside code has no way to reference them by name and would get a NameError trying.",
          misconception:"Assuming a variable assigned anywhere in a program is visible everywhere — Python's scope rules restrict a local variable's visibility to the function it was assigned in." }
      ]},

    { id:"c1t4", title:"Lists & Iteration",
      teach:[
        "A list stores an ordered sequence of values under one variable name, each accessible by a numeric index. Python indexes from 0, meaning the first element is at position 0, and the last element of a list with n items sits at position n - 1 — not n. Reaching for index n directly raises an IndexError, one of the most common early mistakes in Python specifically.",
        "Iterating over a list can use `for item in my_list:`, which visits each element directly without needing an index at all — the idiomatic Python approach. When the position itself matters, `for i in range(len(my_list)):` gives you the index. Either way, len() — a built-in function, not a property — reports how many elements the list currently holds.",
        "Lists support operations beyond simple indexing: searching for a value (the `in` operator, or `.index()` which raises a `ValueError` if the value isn't found), filtering to a subset that matches a condition, and transforming each element into something new. Understanding these as three distinct operations — even before learning Python shortcuts like list comprehensions — clarifies what a piece of code is actually trying to accomplish."
      ],
      example:{ tag:"Worked example", code:
`scores = [72, 88, 91, 60, 79]
passing = []

for score in scores:
    if score >= 70:
        passing.append(score)

print(passing)   # [72, 88, 91, 79]`,
        explain:"The loop visits every element of scores directly, without an index variable — score is bound to each value in turn. Inside, a conditional filters which values get appended into a second list. Nothing about this pattern is specific to grades — it's the general shape of 'walk a list, keep what matches a rule,' and it reappears constantly." },
      exercise:{ prompt:"Given the list [4, 15, 7, 22, 9], write a loop that finds and returns the largest value without using Python's built-in max() function. Paste your code on the left, the value you get on the right.",
        expected:"22", hint:"Start a variable at the first element (index 0), then compare it against every other element — nums[1:] slices off everything after the first — replacing it whenever you find something larger.",
        concepts:["list indexing","iteration","running comparison"],
        solution:`nums = [4, 15, 7, 22, 9]
largest = nums[0]
for n in nums[1:]:
    if n > largest:
        largest = n
print(largest)  # 22` },
      checks:[
        { stem:"A list `arr = [10, 20, 30]` — what happens when you access `arr[3]`?", diff:"easy", type:"mc",
          opts:["It returns 30, the last element","It raises an IndexError, since valid indices only run 0 through 2","It returns len(arr)","It wraps around and returns 10, the first element"],
          ans:1, rationale:"A list with 3 elements has valid indices 0, 1, and 2. Index 3 is one past the last valid position, so Python raises IndexError: list index out of range rather than returning any value.",
          misconception:"Assuming the index equal to a list's length points to the last element, when it actually points one position past it — and unlike some languages, Python raises an explicit error rather than returning None or undefined." },
        { stem:"Why does iterating with `for i in range(len(arr)):` naturally avoid an out-of-bounds access, without needing an extra check?", diff:"med", type:"mc",
          opts:["It doesn't — you still need a separate bounds check","range(len(arr)) generates indices 0 through len(arr) - 1, since range's stop value is excluded, which exactly matches arr's valid index range","len(arr) always equals the highest valid index directly","Python automatically skips the last index"],
          ans:1, rationale:"len(arr) gives the count of elements. range(len(arr)) produces 0, 1, ..., len(arr) - 1 because range excludes its stop value — which lines up exactly with the list's valid indices, with no off-by-one adjustment needed.",
          misconception:"Manually writing range(len(arr) + 1) 'to be safe,' which actually introduces the exact out-of-bounds access it was meant to prevent." },
        { stem:"After `arr = [1, 2, 3]; arr.append(4)`, what is len(arr)?", diff:"easy", type:"mc",
          opts:["3, because append doesn't change the list's reported length","4, because append adds one new element to the end and len() reflects the new count","5, append adds two slots","It depends on the data type of 4"],
          ans:1, rationale:"append adds one new element to the end of the list. The list now holds 4 elements, so len(arr) returns 4 — len() always reflects the list's current state, not its state at creation.",
          misconception:"Assuming a list's length is fixed once created rather than a live count that len() recomputes each time it's called." },
        { stem:"What is the difference between using `value in my_list` and `my_list.index(value)` to check whether a value is present?", diff:"med", type:"mc",
          opts:["They behave identically in every case","`in` returns a bool (True/False) and never fails; `.index()` returns the position if found but raises a ValueError if the value isn't present at all","`.index()` is always safer to use","`in` only works on strings, not lists"],
          ans:1, rationale:"The in operator is a safe existence check that always returns True or False. .index() is for when you need the position, but calling it on a value that isn't in the list raises ValueError: ... is not in list rather than returning something like -1.",
          misconception:"Assuming .index() returns a harmless sentinel value like -1 when nothing is found, the way some other languages' search functions do — Python's .index() raises an exception instead, which calling code must be prepared to handle." },
        { stem:"A for loop iterates `for x in my_list:` over an empty list (`my_list = []`). How many times does the loop body run?", diff:"easy", type:"mc",
          opts:["Zero times, since there are no elements to bind x to","Once, to at least check the list","It raises an error on an empty list","Infinitely, since there's nothing to iterate toward"],
          ans:0, rationale:"Iterating over an empty sequence simply means there's nothing to bind the loop variable to, so the loop body never executes. This is correct, expected behavior, not an error.",
          misconception:"Assuming a loop must run at least once regardless of what it's iterating over — a for loop over a sequence runs exactly as many times as there are elements, including zero." }
      ]},

  ]},

  c2: { name:"C2 · Troubleshooting & Debugging", short:"C2", color:"var(--c2)", topics: [

    { id:"c2t1", title:"Categories of Errors: Syntax, Runtime, Logic",
      teach:[
        "Syntax errors are violations of Python's grammar — a missing colon, a mismatched parenthesis, inconsistent indentation. Python's parser catches these before the program ever executes, printing a SyntaxError (or, specifically for indentation problems, an IndentationError) that points at the offending line. Since Python uses indentation to define blocks instead of braces, inconsistent spacing is a distinctly Python source of this category, one that simply doesn't exist in brace-delimited languages.",
        "Runtime errors — exceptions — occur while the program is executing: dividing by zero raises ZeroDivisionError, calling a method on a value that's None raises AttributeError, reading past the end of a list raises IndexError. The syntax was valid, so the program starts running, then halts partway through when it hits an operation it cannot complete.",
        "Logic errors are the hardest category, because the program runs from start to finish without raising anything and produces an answer — the answer is just wrong. No exception points at the problem; the only signal is output that doesn't match expectations, which is why testing against known correct results matters as much as getting code to simply run without complaint."
      ],
      example:{ tag:"Worked example: same bug, three disguises", code:
`# Syntax error — missing colon
if x > 5
    print("big")

# Runtime error — a ZeroDivisionError exception
average = total / count   # count is 0 here

# Logic error — runs fine, wrong formula
area_of_circle = radius * radius * 3   # should be * math.pi`,
        explain:"All three examples are 'wrong' but in fundamentally different ways. The first never runs — Python's parser rejects it immediately. The second runs partway then crashes at that specific line with a ZeroDivisionError. The third runs to completion and prints a plausible-looking number that is simply incorrect — 3 instead of roughly 3.14159 is a subtle enough substitution that it can survive a casual read-through of the code." },
      exercise:{ prompt:"For each of these three snippets, decide which category — syntax, runtime, or logic — the error belongs to, then paste your three answers as a comma-separated list on the left. Snippets: (1) `arr[10]` where arr only has 3 elements, (2) `for i in range(10)` written with a missing colon at the end, (3) a tax calculator that always applies a 5% rate regardless of income bracket. Paste what you'd expect from testing each on the right.",
        expected:"runtime, syntax, logic",
        hint:"Ask: does it fail to run at all (syntax), crash partway through with an exception (runtime), or run to completion with a wrong answer (logic)?",
        concepts:["error taxonomy","diagnostic reasoning"],
        solution:`1. arr[10] on a 3-element list: RUNTIME — valid syntax, raises IndexError when that line executes.
2. missing colon after range(10): SYNTAX — the parser rejects it before anything runs.
3. flat 5% rate ignoring brackets: LOGIC — runs fine, returns a number, the number is simply wrong.` },
      checks:[
        { stem:"A program crashes partway through with `AttributeError: 'NoneType' object has no attribute 'name'`. What category is this?", diff:"easy", type:"mc",
          opts:["Syntax error","Runtime error","Logic error","A compilation error only"],
          ans:1, rationale:"The program's syntax was valid enough to start running, and it failed midway when it tried to access .name on a value that was None — the defining trait of a runtime error (an exception raised during execution).",
          misconception:"Labeling every crash a 'syntax error' regardless of when it happens — syntax errors specifically prevent the program from starting at all." },
        { stem:"A grading script runs without raising any exceptions but assigns every student a B regardless of their actual score. What should you check first?", diff:"med", type:"mc",
          opts:["Check for missing colons","Check the conditional logic and thresholds that assign letter grades, since this is a logic error with no exception to point at it","Check whether the file was saved","Restart the interpreter, since it's likely a memory issue"],
          ans:1, rationale:"No exception occurred and the program completed, which rules out syntax and runtime errors by definition. The wrong-but-consistent output is the signature of a logic error — most often a comparison operator, boundary value, or branch ordering mistake in the grading conditionals.",
          misconception:"Reflexively blaming the environment (memory, save state) when output is simply incorrect rather than examining the decision logic that produced it." },
        { stem:"Which exception does dividing by zero raise in Python, and which error category does it belong to?", diff:"easy", type:"mc",
          opts:["SyntaxError; caught before the program runs","ZeroDivisionError; a runtime error, since the program starts running and fails partway through attempting the division","LogicError; the program's math is simply wrong","IndexError; since it involves a numeric operation"],
          ans:1, rationale:"Python raises a specific exception, ZeroDivisionError, the moment a division by zero is attempted during execution. That's a runtime error by definition — valid syntax, a program that was already running, halted by a specific failed operation.",
          misconception:"Assuming there's a generic catch-all 'math error' rather than Python's convention of raising a specific, named exception type for each distinct failure — recognizing the exception name is often the fastest path to the cause." },
        { stem:"A block is indented with a mix of tabs and spaces, and Python raises an IndentationError before the program runs. What category does this fall under, and why does this specific error type exist in Python?", diff:"med", type:"mc",
          opts:["It's a runtime error, since it only shows up when that block executes","It's a syntax error — a subtype specific to Python, since Python uses indentation itself to define code blocks instead of braces, so inconsistent indentation breaks the grammar before execution ever starts","It's a logic error, since the code might still run correctly","IndentationError doesn't actually stop the program"],
          ans:1, rationale:"IndentationError is a subclass of SyntaxError. Because Python's grammar relies on consistent indentation to delimit blocks (rather than braces or keywords), inconsistent indentation is a grammar violation caught by the parser before any code executes — a category of syntax error that doesn't have a direct equivalent in brace-delimited languages.",
          misconception:"Assuming indentation is just a style convention in Python rather than part of the language's actual grammar — inconsistent indentation isn't a formatting complaint, it prevents the program from parsing at all." },
        { stem:"A loop that never terminates because its exit condition is never satisfied — which error category does this fall under?", diff:"med", type:"mc",
          opts:["Syntax error, since the loop is malformed","Logic error, since the program runs (and keeps running) without raising anything, but never reaches a correct stopping point","Runtime error, since it always crashes eventually","It isn't an error at all if the loop body has valid syntax"],
          ans:1, rationale:"An infinite loop is syntactically valid and doesn't raise an exception on its own — it simply never satisfies the condition that was supposed to end it. That's a flaw in the program's logic, not its grammar or an operation it couldn't complete.",
          misconception:"Assuming any long-running or broken-seeming program must be a runtime error — a runtime error specifically means an operation failed and raised an exception, which an infinite loop, by definition, never does." }
      ]},

    { id:"c2t2", title:"A Systematic Debugging Process",
      teach:[
        "Debugging by randomly changing lines until something works is slower than it feels, because it discards information every time it 'accidentally' fixes something without explaining why. A repeatable process trades that speed illusion for actual understanding, and it generalizes across problem types.",
        "The process has a consistent shape: reproduce the bug reliably first — a bug you can't trigger on demand can't be verified as fixed. Then isolate: narrow down which section of code is responsible, typically by checking intermediate values rather than staring at the whole program. Then form a hypothesis about the cause, specific enough that you could be wrong. Then test that hypothesis with the smallest possible change. Then verify the original bug is actually gone, not just quieter.",
        "Isolation is usually the step people skip, jumping straight from 'something's wrong' to 'let me try changing this' without first narrowing down where the fault actually lives. Binary search applies here the same way it does to a sorted list: if a program has ten steps and produces a wrong result, checking the value after step 5 tells you whether the bug is in the first half or second half, cutting the search space roughly in two with a single check. Python's own tooling supports this directly — dropping a `breakpoint()` call into the code pauses execution at that exact line and opens an interactive debugger, letting you inspect or change any variable on the spot instead of deciding in advance what to print."
      ],
      example:{ tag:"Worked example: isolating with checkpoints", code:
`def process_order(items):
    subtotal = calculate_subtotal(items)   # checkpoint A
    tax = calculate_tax(subtotal)          # checkpoint B
    total = subtotal + tax                 # checkpoint C
    return total

# Bug report: total is way too high.
# Check subtotal at A: correct.
# Check tax at B: way too high — found it.`,
        explain:"Rather than reading all three functions end to end guessing which one is wrong, the process checks the intermediate value at each checkpoint in order. subtotal checks out, so calculate_subtotal is cleared as a suspect. tax does not check out, so the search is now confined to calculate_tax — a much smaller space to actually read carefully." },
      exercise:{ prompt:"A function compute_grade(score) is returning \"F\" for a score of 75, which should be a \"C\". Below is the buggy function. Trace it by hand, write down which specific line is wrong on the left, and what the corrected condition should read on the right.",
        starter:`def compute_grade(score):
    if score >= 90:
        return "A"
    if score >= 80:
        return "B"
    if score > 70:
        return "C"
    if score >= 60:
        return "D"
    return "F"`,
        expected:'if score >= 70: return "C"',
        hint:"75 is greater than 70, so score > 70 should already catch it and return C — trace it again more slowly and check every branch above that line too, since the actual bug may sit in a branch you skipped past.",
        concepts:["boundary conditions","branch ordering","hand tracing"],
        solution:`Trace compute_grade(75):
90? no. 80? no. score > 70 -> 75 > 70 is True... so this should return "C".
The teaching point: trace every branch explicitly and check the boundary
value in each condition, rather than assuming the visible code already
matches what you expect it to say — a boundary typo elsewhere in the
chain (like score > 170) would be easy to miss without tracing line by line.` },
      checks:[
        { stem:"Why is reliably reproducing a bug the recommended first step, before trying to fix it?", diff:"easy", type:"mc",
          opts:["It isn't necessary — you can fix bugs without ever seeing them happen","Without a reliable way to trigger the bug, you have no way to confirm afterward whether your fix actually worked or the bug just didn't happen to occur this time","It makes the code run faster","It's only needed for syntax errors"],
          ans:1, rationale:"A fix you can't verify is a guess. If you can't make the bug happen on command, you also can't tell the difference between 'fixed' and 'didn't happen to trigger this time,' which is how bugs quietly come back later.",
          misconception:"Treating verification as optional once a plausible-looking fix has been applied." },
        { stem:"A program has 8 sequential processing steps and produces a wrong final result. What's the most efficient isolation strategy?", diff:"med", type:"mc",
          opts:["Read all 8 steps in order from the top until something looks wrong","Check the intermediate value after step 4 first, then narrow to the half that's actually incorrect, repeating until you isolate one step","Rewrite all 8 steps from scratch","Add print statements to every single line simultaneously"],
          ans:1, rationale:"Checking a midpoint value first and narrowing based on whether it's correct halves the search space with each check — the same binary-search logic used for sorted data, applied to a sequence of computation steps instead.",
          misconception:"Assuming debugging must proceed linearly from the first line of code, which is often the slowest possible search order for a long pipeline." },
        { stem:"Python's built-in breakpoint() pauses execution at that line and opens an interactive debugger. How does this differ from print/trace debugging?", diff:"med", type:"mc",
          opts:["It doesn't differ at all — both do the same thing","It lets you interactively inspect and even change variable values at the paused point without editing the code first, rather than deciding in advance what to print and re-running each time","It only works for syntax errors","It automatically fixes the bug for you"],
          ans:1, rationale:"A breakpoint pauses the program mid-execution and drops into an interactive session where you can inspect any variable, step line by line, or change values on the spot — while print/trace debugging requires deciding in advance exactly what to display and re-running the program for each new question that comes up.",
          misconception:"Assuming print statements and a debugger accomplish the same thing — a debugger lets you explore live program state interactively after the fact, while prints require the specific question to be anticipated before the program even runs." },
        { stem:"After applying a fix, why is it important to re-run the original reproduction steps rather than just moving on?", diff:"easy", type:"mc",
          opts:["It isn't important once the code looks right","To confirm the specific bug is actually gone, not just that the code runs without raising an exception or a different symptom quieted down","Re-running steps is only needed for syntax errors","It's a formality with no real diagnostic value"],
          ans:1, rationale:"A fix can look correct by inspection and still fail to address the actual reported behavior, or it can fix a symptom while leaving the root cause intact. Re-running the original reproduction steps is the only direct confirmation that the specific reported bug no longer occurs.",
          misconception:"Equating 'the code runs without raising an exception' with 'the bug is fixed' — those are different claims, and only re-testing the original scenario verifies the second one." },
        { stem:"When testing a debugging hypothesis, why is making the smallest possible change preferable to changing several things at once?", diff:"med", type:"mc",
          opts:["Smaller changes are always faster to type","If several things change at once and the bug goes away, you can't tell which change actually fixed it — or whether a new problem was introduced alongside the fix","It isn't preferable — more changes fix more bugs at once","Small changes don't need to be tested"],
          ans:1, rationale:"Changing multiple things simultaneously confounds the test: if the bug disappears, you don't actually know which change was responsible, and you may have masked the real cause or introduced a new issue that happens to look like progress.",
          misconception:"Treating a debugging session as a chance to 'clean up' several suspicious-looking things at once — each simultaneous change removes your ability to attribute the outcome to a specific cause." }
      ]},

    { id:"c2t3", title:"Reading Tracebacks & Print/Trace Debugging",
      teach:[
        "In Python, a crash report is called a traceback, not a stack trace, and its own header tells you exactly how to read it: 'Traceback (most recent call last):'. The first frame listed is the outermost call, near the program's entry point, and each frame going down is a call made by the one above it — ending with the exact line that failed and the exception's type and message on the very last line.",
        "New programmers often see the wall of unfamiliar text and read top to bottom looking for the problem near the top, when the single most useful piece of information — the specific exception type and the exact file and line where it occurred — is always at the bottom of a Python traceback. Reading one effectively means starting at the last line and, only if needed, working upward through the call chain to see how execution got there.",
        "Print/trace debugging — inserting temporary print() statements to display a variable's value at a specific point in execution — is a blunt but genuinely effective technique, especially for logic errors that raise no exception and produce no traceback at all. The discipline that makes it work is being specific: printing a labeled value at a chosen checkpoint, rather than scattering unlabeled prints everywhere and losing track of which output came from where."
      ],
      example:{ tag:"Worked example: reading a traceback", code:
`Traceback (most recent call last):
  File "app.py", line 8, in <module>
    checkout()
  File "cart.py", line 27, in checkout
    calculate_total(cart)
  File "cart.py", line 14, in calculate_total
    return item.price
AttributeError: 'NoneType' object has no attribute 'price'`,
        explain:"Read from the bottom up: the last line names the exception type (AttributeError) and the message — something was None when the code tried to access .price on it. The line just above shows exactly where that happened: cart.py, line 14, inside calculate_total. Moving further up shows who called whom to get there — checkout called calculate_total, and the module-level code called checkout. Start at the bottom, and only work up if you need to see how a bad value arrived at that point." },
      exercise:{ prompt:"A function is producing an unexpected total but raises no exception. Add print statements to the code below at the marked checkpoint to reveal the running total after each item, then paste your instrumented code on the left and the printed sequence you'd expect on the right, for items = [10, 20, 30].",
        starter:`def sum_items(items):
    total = 0
    for item in items:
        total += item
        # add a print here
    return total`,
        expected:"10, 30, 60",
        hint:"Insert print(total) right after the accumulation line, inside the loop, so it fires once per iteration.",
        concepts:["print/trace debugging","checkpoint placement","accumulator tracing"],
        solution:`def sum_items(items):
    total = 0
    for item in items:
        total += item
        print(total)   # prints 10, then 30, then 60
    return total` },
      checks:[
        { stem:"In a Python traceback, which line identifies the exact exception type and where the program actually failed?", diff:"med", type:"mc",
          opts:["The first line at the top, since Python reads like other languages, most-recent-first","The very last line, since Python's own header states 'most recent call last' — the bottom line names the exception and where it happened","Whichever line contains the word 'Error'","Python tracebacks don't include line numbers"],
          ans:1, rationale:"Python's traceback format is explicit about its own order — 'most recent call last' — meaning the deepest, most recent call, where the actual failure occurred, is printed last, at the bottom, along with the exception type and message.",
          misconception:"Reading a Python traceback the same way as a stack trace from a language that lists the most recent call first — Python's order is the reverse, and its own header states this directly if you read it." },
        { stem:"A traceback lists three frames below the header, each from a different function. What do those frames represent?", diff:"med", type:"mc",
          opts:["Three separate errors that all happened at once","The chain of function calls that were active leading up to the failure, each one still 'on the stack' waiting for the one below it to return","Three different possible fixes","Unrelated warnings that can be ignored"],
          ans:1, rationale:"A traceback shows the call chain, not multiple errors — each frame is a function call that was still active (had not yet returned) at the moment the exception occurred, from the outermost call down to the specific line that failed.",
          misconception:"Interpreting each frame of a traceback as a distinct problem to fix individually, rather than a single chain of calls leading to one point of failure." },
        { stem:"Why is it good practice to remove temporary print/trace statements once a bug is fixed, rather than leaving them in?", diff:"easy", type:"mc",
          opts:["print() statements permanently slow down the interpreter","Leftover debug output clutters real program output and can make it harder to spot genuinely important messages later, including during the next debugging session","It's not good practice — leaving them in is always preferred","print() statements cause SyntaxErrors if left in too long"],
          ans:1, rationale:"Temporary prints served their purpose once the bug was located and confirmed fixed. Left in place, they mix debug noise into normal output, which makes future debugging sessions slower since real signal has to be picked out from leftover clutter.",
          misconception:"Treating debug prints as harmless to leave behind — accumulated leftover prints across many past debugging sessions can make a program's output nearly unreadable." },
        { stem:"A traceback's frame points into a third-party library's file rather than your own code. Where should you generally look first?", diff:"hard", type:"mc",
          opts:["Assume the library itself is broken and stop debugging","Check the frame just below it, in your own code — that's usually where a bad value was passed into the library in the first place","Ignore the traceback entirely since it's not your code","Rewrite the library from scratch"],
          ans:1, rationale:"Well-established libraries are rarely the actual root cause. The frame just below the library's, in your own code, usually shows where the library function was called — and that's typically where an unexpected or malformed value was passed in, triggering the failure inside the library.",
          misconception:"Assuming an exception raised inside a library's file means the library is at fault, when the far more common cause is bad input handed to it from the calling code." },
        { stem:"Print/trace debugging is especially useful for which category of error?", diff:"med", type:"mc",
          opts:["Syntax errors, since prints reveal missing punctuation","Logic errors, which raise no exception and produce no traceback to point at a location","Runtime errors only, since they always include a traceback already","It's not useful for any category — only a debugger works"],
          ans:1, rationale:"Logic errors run to completion with no exception at all. Since there's no traceback to consult, printed checkpoint values are often the only way to see where the computed values diverge from what's expected.",
          misconception:"Assuming print debugging is a 'beginner crutch' inferior to a debugger in every case — for tracing a value's evolution across a loop, a well-placed print is often faster to set up than stepping through a debugger." }
      ]},

    { id:"c2t4", title:"Common Bug Patterns & Defensive Coding",
      teach:[
        "A handful of bug shapes recur across almost every codebase, which makes them worth recognizing by pattern rather than re-deriving each time. Off-by-one errors — a loop that runs one time too many or too few, an index that's one position off — come from boundary conditions, often a range() call with the wrong stop value.",
        "In Python, a missing or not-yet-available value is represented by None, and code that assumes a value exists — a lookup succeeded, an attribute is present, a function returned something usable — without checking raises an AttributeError the moment it's used. A related trap: `if value:` treats 0, an empty string, and an empty list as falsy, exactly like None — so a plain truthiness check can't distinguish a legitimately empty or zero value from one that's genuinely missing. `if value is None:` checks specifically for absence.",
        "Defensive coding means writing code that fails loudly and close to the actual problem instead of silently producing wrong results far downstream, often by raising a specific exception with `raise ValueError(...)` at the point an assumption is checked. One well-known Python-specific trap worth naming directly: a mutable default argument like a list is created exactly once, when the function is defined, not fresh on every call — so `def add_item(item, basket=[]):` silently accumulates state across calls that don't supply their own basket."
      ],
      example:{ tag:"Worked example: defensive check", code:
`# Fragile: assumes user always exists
def get_user_email(user):
    return user.email

# Defensive: fails clearly and immediately if the assumption breaks
def get_user_email(user):
    if user is None:
        raise ValueError("get_user_email called with no user object")
    return user.email`,
        explain:"The fragile version, given None instead of a real user object, raises AttributeError: 'NoneType' object has no attribute 'email' — possibly from a call site several functions removed from where the bad value actually originated. The defensive version raises a ValueError immediately, at the exact point the bad assumption was made, naming the actual problem and cutting debugging time considerably." },
      exercise:{ prompt:"The function below raises a ZeroDivisionError when called with an empty list. Add a defensive check that returns 0 for an empty list instead of crashing, and paste your corrected function on the left, with the output for average_of([]) on the right.",
        starter:`def average_of(nums):
    total = 0
    for n in nums:
        total += n
    return total / len(nums)`,
        expected:"0",
        hint:"Dividing by len(nums) when the list is empty divides by 0. Add a check at the top: if the list has no elements, return 0 immediately before the loop runs.",
        concepts:["defensive coding","edge cases","division by zero"],
        solution:`def average_of(nums):
    if len(nums) == 0:
        return 0
    total = 0
    for n in nums:
        total += n
    return total / len(nums)` },
      checks:[
        { stem:"What is the defining trait of an off-by-one error?", diff:"easy", type:"mc",
          opts:["The program crashes on startup","A loop or index is exactly one position too far in one direction, often from a boundary mistake like an incorrect range() stop value","The program uses the wrong data type","The variable name is misspelled"],
          ans:1, rationale:"Off-by-one errors are specifically boundary mistakes — running an extra iteration, stopping one short, or reading one index past or before where you meant to.",
          misconception:"Lumping all indexing or loop bugs together as 'off-by-one' when some are actually a different root cause, like an uninitialized counter — precision in naming the bug type speeds up finding it." },
        { stem:"Why does a defensive check that raises immediately with a clear message reduce debugging time compared to letting a bad value propagate?", diff:"med", type:"mc",
          opts:["It doesn't — it just adds more code to maintain","It surfaces the problem at its origin instead of letting it resurface later as a confusing AttributeError or wrong result several function calls downstream","It makes the program run faster","It automatically fixes the bad value"],
          ans:1, rationale:"When bad input is caught immediately at the point it enters a function, the raised exception points directly at the actual source. Left unchecked, that same bad value can travel through several more functions before finally causing a failure somewhere that has nothing to do with where the problem started.",
          misconception:"Viewing input validation as unnecessary overhead rather than as a debugging-time investment that pays off the first time a bad value shows up in production." },
        { stem:"Why isn't `if value:` always equivalent to `if value is None:` when checking whether a value is present?", diff:"med", type:"mc",
          opts:["There's no difference, they always behave identically","`if value:` treats 0, empty strings, and empty lists as falsy too, incorrectly grouping a legitimate zero or empty value with a genuinely missing one; `if value is None:` checks specifically for absence","is None only works on strings","if value: is always the safer choice"],
          ans:1, rationale:"Python treats several legitimate values — 0, \"\", [], {} — as falsy, the same as None, in a plain truthiness check. If a valid input can legitimately be zero or empty, `if value:` will incorrectly treat it the same as missing; `is None` checks specifically and only for actual absence.",
          misconception:"Assuming a plain truthiness check is equivalent to explicitly checking for None — this substitution silently misclassifies valid falsy values like 0 or an empty list as if they were missing." },
        { stem:"A function is defined `def add_item(item, basket=[]): basket.append(item); return basket`. Called twice with no second argument, the second call's basket unexpectedly already contains the first call's item. Why?", diff:"hard", type:"mc",
          opts:["Lists are always shared globally in Python","A mutable default argument like a list is created exactly once, when the function is defined, and reused across every call that doesn't supply its own — so basket accumulates state between calls instead of starting fresh","Python resets default arguments after every call, so this shouldn't happen","append() creates a brand-new list automatically each time"],
          ans:1, rationale:"Default argument values in Python are evaluated once, at function definition time, not fresh on every call. A mutable default like a list persists across calls that rely on it, silently accumulating state — a well-known, well-documented Python pitfall usually avoided by defaulting to None and creating a new list inside the function body when needed.",
          misconception:"Assuming a default argument is re-created fresh every time the function is called, the same way a local variable would be — mutable defaults are a specific, well-documented exception to that expectation." },
        { stem:"Calling the fragile version of get_user_email(None) — what actually happens?", diff:"med", type:"mc",
          opts:["It returns None silently, with no indication anything went wrong","It raises AttributeError: 'NoneType' object has no attribute 'email', failing at the exact line that assumed user was never None","It returns an empty string","It raises a ValueError automatically, without needing a defensive check"],
          ans:1, rationale:"Attempting to access .email on None specifically raises Python's AttributeError with a message naming the type (NoneType) and the missing attribute — a very common runtime error whenever code assumes a value exists without checking first.",
          misconception:"Assuming a missing/None value causes a generic, unlabeled crash — Python's AttributeError message is actually quite specific about what happened, and learning to read it (NoneType has no attribute X) points directly at the assumption that broke." }
      ]},

  ]},

  c3: { name:"C3 · Relational Databases & SQL", short:"C3", color:"var(--c3)", topics: [

    { id:"c3t1", title:"The Relational Model: Tables, Keys & Relationships",
      teach:[
        "A relational database organizes data into tables, each representing one kind of entity — students, courses, enrollments — with rows as individual records and columns as the attributes every record shares. The word 'relational' refers to how tables relate to each other through shared columns, not to the everyday sense of 'relationship.'",
        "A primary key is a column (or combination of columns) that uniquely identifies each row in a table — no two rows share the same value, and it's never left empty. A foreign key is a column in one table that holds a primary key value from another table, and that's the actual mechanism that connects related data across tables rather than duplicating it everywhere it's needed.",
        "The reason to split data into separate related tables instead of one giant flat table is to avoid repeating the same information in multiple rows. Storing a student's full name and email on every single enrollment row means updating that student's email requires finding and changing every row that mentions them; storing student details once in a Students table and referencing that student by ID from an Enrollments table means the update happens in exactly one place."
      ],
      example:{ tag:"Worked example: two related tables", code:
`Students                        Enrollments
+----+----------+--------+       +----+------------+---------+
| id | name     | email  |       | id | student_id | course  |
+----+----------+--------+       +----+------------+---------+
| 1  | A. Ruiz  | a@..   |       | 1  | 1          | CS101   |
| 2  | B. Chen  | b@..   |       | 2  | 1          | MATH210 |
+----+----------+--------+       | 3  | 2          | CS101   |
                                  +----+------------+---------+`,
        explain:"`Students.id` is that table's primary key. `Enrollments.student_id` is a foreign key — it holds values that reference `Students.id`, which is how row 1 and row 2 of Enrollments both point back to A. Ruiz without ever storing her name or email a second time. Change her email once in Students, and every enrollment referencing student_id 1 reflects that change automatically the next time it's looked up." },
      exercise:{ prompt:"Using the two tables above, write down (on the left) which student is enrolled in MATH210, tracing the foreign key relationship manually. Then write the SQL query that would answer the same question (on the right).",
        expected:"A. Ruiz",
        hint:"Find the Enrollments row where course = 'MATH210', read its student_id, then look up that id in the Students table.",
        concepts:["primary key","foreign key","manual join tracing"],
        solution:`Enrollments row with course='MATH210' has student_id = 1.
Students row with id = 1 is A. Ruiz.

SELECT s.name
FROM Students s
JOIN Enrollments e ON s.id = e.student_id
WHERE e.course = 'MATH210';` },
      checks:[
        { stem:"What makes a column a valid primary key for a table?", diff:"easy", type:"mc",
          opts:["It must be a number","Every row must have a unique, non-empty value in that column","It must be the first column in the table","It must be named 'id'"],
          ans:1, rationale:"The defining requirement of a primary key is uniqueness and completeness — every row has one, and no two rows share the same value. The data type and column name are conventions, not requirements.",
          misconception:"Assuming a primary key must literally be named 'id' or must be numeric — an email address or a combination of columns can serve as a primary key as long as uniqueness holds." },
        { stem:"Why store student information once in a Students table rather than repeating name and email on every Enrollments row?", diff:"med", type:"mc",
          opts:["It makes queries run in alphabetical order","It avoids duplicated data, so updating a student's information happens in one place instead of requiring every row that mentions them to be found and changed","Foreign keys require it by syntax rule","It reduces the number of tables the database can have"],
          ans:1, rationale:"This is the core motivation behind normalization: each fact lives in exactly one place. A foreign key reference lets related tables point at that single source of truth instead of copying it, which is what keeps an update from turning into a multi-row hunt-and-fix.",
          misconception:"Treating table-splitting as an arbitrary organizational preference rather than a direct defense against update inconsistency." },
        { stem:"Can a primary key consist of more than one column?", diff:"med", type:"mc",
          opts:["No, a primary key must always be a single column","Yes — a composite primary key uses two or more columns together, where the combination is unique even if no single column alone is","No, only foreign keys can span multiple columns","Yes, but only in NoSQL databases"],
          ans:1, rationale:"A composite key uses the combination of two or more columns to guarantee uniqueness, useful when no single column is unique on its own — a table tracking enrollments might use (student_id, course_id) together, since each specific pairing should appear once even though neither column alone is unique.",
          misconception:"Assuming a primary key must always be a single simple column — many real schemas use composite keys where uniqueness only holds across a combination of fields." },
        { stem:"What problem is normalization (splitting data into related tables) primarily designed to prevent?", diff:"med", type:"mc",
          opts:["Slow query performance","Redundant, duplicated data that can become inconsistent when only some copies of it get updated","Running out of storage space","Having too many tables in a database"],
          ans:1, rationale:"Normalization organizes data so each fact is stored in exactly one place. Without it, the same information repeated across many rows can drift out of sync when an update only reaches some of the copies.",
          misconception:"Assuming normalization is primarily a performance or storage-space optimization — its core purpose is data integrity and consistency, and it can sometimes trade off against raw query speed." },
        { stem:"In a one-to-many relationship between Students and Enrollments (one student can have many enrollments), which table holds the foreign key?", diff:"med", type:"mc",
          opts:["Students, since it's the 'one' side","Enrollments, the 'many' side — each enrollment row references exactly one student via student_id","Both tables need a foreign key pointing at each other","Neither — foreign keys are only used in many-to-many relationships"],
          ans:1, rationale:"In a one-to-many relationship, the foreign key lives on the 'many' side, since each row there needs to point back to exactly one row on the 'one' side. Students doesn't need one — it would have no single Enrollments row to consistently point to.",
          misconception:"Assuming the foreign key placement is arbitrary or could go on either table — the direction of a one-to-many relationship specifically determines which table needs the referencing column." }
      ]},

    { id:"c3t2", title:"Querying with SELECT: Filtering, Sorting, Aggregating",
      teach:[
        "A SELECT statement retrieves data from one or more tables. At minimum it names which columns to return and from which table; `SELECT *` returns every column, which is convenient while exploring but worth narrowing down in real queries, since pulling unnecessary columns wastes bandwidth and makes results harder to read.",
        "WHERE filters which rows are included, evaluated per row before anything else happens — `WHERE score >= 70` keeps only rows where that condition is true. ORDER BY sorts the result set after filtering, ascending by default or descending with the DESC keyword. LIMIT caps how many rows come back, useful for anything from 'top 10' queries to just sanity-checking a query against a big table without pulling the whole thing.",
        "Aggregate functions — COUNT, SUM, AVG, MIN, MAX — collapse many rows into a single summary value. Paired with GROUP BY, they collapse rows into one summary value *per group* instead of one value overall: `SELECT department, AVG(salary) FROM employees GROUP BY department` gives one average per department, not one average for the whole table. A frequent early mistake is including a non-aggregated, non-grouped column in the SELECT list alongside an aggregate — most databases will reject that as ambiguous, since there's no single value for that column to report per group."
      ],
      example:{ tag:"Worked example", code:
`SELECT department, COUNT(*) AS num_employees, AVG(salary) AS avg_salary
FROM employees
WHERE hire_date >= '2020-01-01'
GROUP BY department
ORDER BY avg_salary DESC
LIMIT 5;`,
        explain:"Execution order (not the order it's written): rows are filtered by WHERE first — only employees hired since 2020 remain in play. Those rows are then bucketed by department with GROUP BY. Within each bucket, COUNT and AVG collapse the rows into one row per department. The result set is then sorted by avg_salary from highest to lowest, and only the top 5 departments are returned." },
      exercise:{ prompt:"Given a table Orders(id, customer, amount, status), write a query that returns the total amount spent by each customer, but only counting orders with status = 'completed', showing only customers whose total exceeds 500. Paste your query on the left, and on the right, note which clause you used to filter completed orders vs. which clause filters the total.",
        expected:"WHERE filters rows before grouping; HAVING filters after aggregation",
        hint:"WHERE status = 'completed' happens before grouping. Filtering on the aggregated SUM afterward requires HAVING, not WHERE — WHERE can't reference an aggregate result.",
        concepts:["WHERE vs HAVING","GROUP BY","aggregate filtering"],
        solution:`SELECT customer, SUM(amount) AS total_spent
FROM Orders
WHERE status = 'completed'
GROUP BY customer
HAVING SUM(amount) > 500;

WHERE filters individual rows before they're grouped (status check).
HAVING filters groups after aggregation (the summed total per customer).` },
      checks:[
        { stem:"What is the correct order of logical evaluation for a query with WHERE, GROUP BY, and ORDER BY?", diff:"med", type:"mc",
          opts:["ORDER BY, then WHERE, then GROUP BY","WHERE filters rows first, then GROUP BY buckets them, then ORDER BY sorts the final result","GROUP BY runs first on the whole table, then WHERE, then ORDER BY","They all run simultaneously"],
          ans:1, rationale:"Rows are filtered before grouping, so WHERE only ever sees individual, ungrouped rows. Sorting happens last, on whatever result set remains after filtering and grouping are done.",
          misconception:"Assuming SQL clauses execute in the order they're typed — the written order (SELECT, FROM, WHERE, GROUP BY, ORDER BY) is not the same as the logical execution order." },
        { stem:"Why can't WHERE be used to filter on the result of an aggregate function like SUM(amount) > 500?", diff:"hard", type:"mc",
          opts:["WHERE can be used for this — HAVING is only for legacy databases","WHERE filters individual rows before aggregation happens, so the aggregated value doesn't exist yet at the point WHERE is evaluated; HAVING filters after grouping, when it does","WHERE only works with text columns","There's no functional difference between WHERE and HAVING"],
          ans:1, rationale:"WHERE operates on raw rows before GROUP BY collapses them, so an aggregate like SUM hasn't been computed yet at that stage. HAVING exists specifically to filter after aggregation, once grouped summary values are available to compare against.",
          misconception:"Treating WHERE and HAVING as interchangeable synonyms rather than filters that operate at two different stages of query execution." },
        { stem:"A query returns duplicate rows because several orders share the same customer name. What keyword returns each unique customer name only once?", diff:"easy", type:"mc",
          opts:["UNIQUE","DISTINCT — placed after SELECT, it collapses duplicate rows in the result down to one","ONLY","SINGLE"],
          ans:1, rationale:"SELECT DISTINCT removes duplicate rows from the result set based on the selected columns. Without it, a query selecting just customer name from an Orders table returns one row per order, including repeats for customers with multiple orders.",
          misconception:"Assuming a query naturally returns unique values by default — SELECT returns one row per matching row in the source table(s) unless DISTINCT (or grouping) explicitly collapses duplicates." },
        { stem:"What does `WHERE name LIKE 'A%'` match?", diff:"med", type:"mc",
          opts:["Only the exact value 'A%'","Any value that starts with the letter A, since % is a wildcard matching zero or more of any character","Any value containing the letter A anywhere","Only single-character names starting with A"],
          ans:1, rationale:"% is a wildcard that matches any sequence of characters, including none. Placed at the end of 'A', the pattern matches anything starting with A — Alice, Aaron, A — but not Barbara, since it doesn't start with A.",
          misconception:"Treating % as matching exactly one character, or assuming LIKE without any wildcards behaves differently from = — LIKE with no % characters at all behaves essentially like an exact match." },
        { stem:"Why does `WHERE email = NULL` fail to find rows where email is actually NULL?", diff:"hard", type:"mc",
          opts:["It doesn't fail — this is the correct way to check for NULL","NULL represents 'unknown,' and comparing anything to an unknown value with = also yields unknown (not true), so the row is never matched; IS NULL is the correct check","NULL is treated as the string 'NULL' by the database","= only works on numeric columns"],
          ans:1, rationale:"NULL means the absence of a known value, and SQL's three-valued logic means any comparison involving NULL using = evaluates to unknown rather than true or false — so it never satisfies a WHERE clause. IS NULL is a dedicated check specifically designed to test for that absence.",
          misconception:"Treating NULL like a regular value that can be compared with =, when it specifically represents the absence of a value and requires the IS NULL / IS NOT NULL operators instead." }
      ]},

    { id:"c3t3", title:"Combining Tables with JOINs",
      teach:[
        "A JOIN combines rows from two or more tables based on a related column between them, typically a foreign key matching a primary key. Without a join, related data trapped in separate tables can only be looked at one table at a time; a join is what lets a single query answer a question like 'which courses is A. Ruiz enrolled in' by pulling from both Students and Enrollments at once.",
        "An INNER JOIN returns only rows where a match exists in both tables — a student with zero enrollments simply disappears from the result entirely, along with any enrollment row whose student_id doesn't match any row in Students. A LEFT JOIN keeps every row from the left (first-named) table regardless of whether a match exists on the right, filling in NULLs for the right side's columns when there's no match — the difference matters enormously for a question like 'list every student, including ones with no enrollments yet.'",
        "The ON clause specifies exactly which columns must match for rows to be paired. Forgetting the ON clause, or getting the joined columns wrong, produces a cross join in effect — every row from one table paired with every row from the other, a result set that grows multiplicatively and almost never matches what was intended."
      ],
      example:{ tag:"Worked example: INNER vs LEFT", code:
`-- INNER JOIN: only students who have at least one enrollment appear
SELECT s.name, e.course
FROM Students s
INNER JOIN Enrollments e ON s.id = e.student_id;

-- LEFT JOIN: every student appears, even with no enrollments
SELECT s.name, e.course
FROM Students s
LEFT JOIN Enrollments e ON s.id = e.student_id;`,
        explain:"If a third student, C. Ortiz, exists in Students but has never enrolled in anything, the INNER JOIN version omits her from the results entirely — there's no matching row in Enrollments to pair her with. The LEFT JOIN version still includes her, with `e.course` showing NULL for that row, because LEFT JOIN's contract is to preserve every row from the left table no matter what." },
      exercise:{ prompt:"Using Students and Enrollments from the earlier topic, plus a hypothetical third student C. Ortiz with id 3 and no enrollment rows, write the LEFT JOIN query that lists every student's name alongside their course (or NULL). Paste your query on the left, and on the right list how many total rows the result would contain.",
        expected:"4",
        hint:"A. Ruiz has 2 enrollments, B. Chen has 1, C. Ortiz has 0 but still appears once with a NULL course under LEFT JOIN. 2 + 1 + 1 = 4.",
        concepts:["LEFT JOIN","NULL handling","row-count reasoning"],
        solution:`SELECT s.name, e.course
FROM Students s
LEFT JOIN Enrollments e ON s.id = e.student_id;

Row count: A. Ruiz appears twice (CS101, MATH210), B. Chen once (CS101),
C. Ortiz once with course = NULL. Total = 4 rows.` },
      checks:[
        { stem:"A student has no rows in the Enrollments table. Using an INNER JOIN between Students and Enrollments, what happens to that student in the result set?", diff:"med", type:"mc",
          opts:["They appear once with NULL for enrollment columns","They don't appear in the result at all, since INNER JOIN only returns rows with a match on both sides","They cause the query to throw an error","They appear once for every other student in the table"],
          ans:1, rationale:"INNER JOIN's defining behavior is to return only matched pairs. A student with zero matching rows in Enrollments contributes nothing to the joined result — not a NULL row, no row at all.",
          misconception:"Expecting INNER JOIN to behave like LEFT JOIN and still surface unmatched rows with NULLs — that NULL-filling behavior is specific to outer joins (LEFT, RIGHT, FULL), not INNER." },
        { stem:"What determines which rows from two tables get paired together in a JOIN?", diff:"easy", type:"mc",
          opts:["Their row order in each table","The condition specified in the ON clause, typically matching a foreign key to a primary key","Alphabetical order of the table names","JOINs pair every possible combination automatically, with no condition needed"],
          ans:1, rationale:"The ON clause is where the matching condition is defined. Omitting it or writing an incorrect condition changes which rows get paired, and can accidentally produce a cross-product of every row against every row.",
          misconception:"Assuming a JOIN 'just knows' how to match related tables without an explicit condition — the relationship has to be stated, usually via a foreign-key-to-primary-key comparison." },
        { stem:"How does a RIGHT JOIN differ from a LEFT JOIN?", diff:"med", type:"mc",
          opts:["They are identical in every case","A RIGHT JOIN preserves every row from the second (right-named) table regardless of a match, the mirror image of how LEFT JOIN preserves every row from the first table","RIGHT JOIN only works with numeric columns","RIGHT JOIN always returns fewer rows than LEFT JOIN"],
          ans:1, rationale:"LEFT JOIN keeps every row from the table listed first (left), filling NULLs on the right when there's no match. RIGHT JOIN mirrors that — it keeps every row from the table listed second (right) regardless of whether a match exists in the first table.",
          misconception:"Assuming LEFT and RIGHT refer to some property of the data rather than simply which table — the one named first or second in the JOIN clause — gets its rows fully preserved." },
        { stem:"Can a single query join more than two tables together?", diff:"easy", type:"mc",
          opts:["No, SQL only supports joining exactly two tables per query","Yes — additional JOIN clauses can chain further tables, each with its own ON condition connecting it to the growing result","Yes, but only using UNION instead of JOIN","No, joining three or more tables requires a stored procedure"],
          ans:1, rationale:"A query can include multiple JOIN clauses in sequence, each connecting a new table into the combined result via its own ON condition — a common pattern when a question spans three or more related tables.",
          misconception:"Assuming JOIN is limited to exactly two tables per query — there's no such limit; each additional JOIN clause simply extends the same combined result set further." },
        { stem:"A JOIN is written with an ON condition that doesn't correspond to a real foreign-key relationship between the tables. What's the likely result?", diff:"hard", type:"mc",
          opts:["The database rejects the query with an error","The query still runs and returns whatever rows happen to satisfy that condition, which may be meaningless or far larger than intended, since the database doesn't require a JOIN condition to reflect a real relationship","It automatically falls back to the correct foreign key","JOIN requires the ON condition to reference a declared foreign key, or it won't compile"],
          ans:1, rationale:"SQL doesn't require an ON condition to reflect an actual foreign-key relationship — it evaluates the condition exactly as written. A poorly chosen or unrelated condition still executes, producing a result set that may be nonsensical or far larger than intended.",
          misconception:"Assuming the database validates that a JOIN condition makes semantic sense — it only checks that the SQL is syntactically valid, not that the columns being matched have any real relationship." }
      ]},

    { id:"c3t4", title:"Modifying Data & Enforcing Constraints",
      teach:[
        "INSERT adds new rows, UPDATE modifies existing rows, and DELETE removes rows — all three operate on rows that match whatever WHERE clause is specified, or on every row in the table if WHERE is omitted entirely. Running an UPDATE or DELETE without a WHERE clause is one of the most consequential mistakes possible in a database course or a production system, because it applies to the entire table with no confirmation step.",
        "Constraints are rules the database enforces automatically, rejecting any operation that would violate them rather than trusting application code to always check first. NOT NULL rejects an insert or update that would leave a required column empty. UNIQUE rejects a value that already exists elsewhere in that column. A FOREIGN KEY constraint rejects inserting a value that doesn't correspond to an existing row in the referenced table — you can't enroll student_id 99 in a course if no student with id 99 exists.",
        "These constraints exist specifically to protect data integrity independent of any single application's discipline. Multiple programs, scripts, or people might write to the same database over its lifetime; a constraint enforced at the database level holds regardless of which one of them forgot to validate input first."
      ],
      example:{ tag:"Worked example", code:
`-- Table definition with constraints
CREATE TABLE Students (
    id INTEGER PRIMARY KEY,
    email TEXT UNIQUE NOT NULL
);

-- This succeeds
INSERT INTO Students (id, email) VALUES (1, 'a@school.edu');

-- This fails: email must be unique
INSERT INTO Students (id, email) VALUES (2, 'a@school.edu');

-- This fails: email cannot be null
INSERT INTO Students (id, email) VALUES (3, NULL);`,
        explain:"The UNIQUE constraint on email rejects the second insert outright — the database refuses the operation rather than silently storing a duplicate. The NOT NULL constraint rejects the third insert the same way. Neither failure required any application-level validation code; the database itself is the safeguard, which is exactly the point of declaring constraints at table-creation time instead of hoping every insert statement checks first." },
      exercise:{ prompt:"Write an UPDATE statement that raises every employee's salary in the 'Sales' department by 5%, being careful to include a WHERE clause so it doesn't apply company-wide. Paste your statement on the left, and on the right, describe in one sentence what would happen if the WHERE clause were accidentally omitted.",
        expected:"every employee in the entire table would get a 5% raise, not just Sales",
        hint:"UPDATE table SET column = column * 1.05 WHERE department = 'Sales'; — the WHERE clause is what scopes the change to one department instead of the whole table.",
        concepts:["UPDATE scoping","WHERE clause safety","unintended full-table writes"],
        solution:`UPDATE Employees
SET salary = salary * 1.05
WHERE department = 'Sales';

Without WHERE, every row in Employees would get the 5% raise applied,
not just the Sales department — a company-wide change from what was
meant to be a scoped one.` },
      checks:[
        { stem:"What happens if you run `DELETE FROM Orders;` with no WHERE clause?", diff:"easy", type:"mc",
          opts:["Nothing — DELETE requires a WHERE clause by syntax rule","Every single row in the Orders table is deleted","Only the first row is deleted","It only deletes rows created today"],
          ans:1, rationale:"DELETE without a WHERE clause applies to every row in the table with no exceptions and, in most systems, no confirmation prompt. This is why writing and double-checking the WHERE clause before running a DELETE or UPDATE is treated as a critical habit rather than an optional nicety.",
          misconception:"Assuming the database will refuse an unscoped DELETE or ask for confirmation by default — most systems execute it immediately and irreversibly exactly as written." },
        { stem:"A table has a FOREIGN KEY constraint on student_id referencing Students(id). What happens if you try to insert an Enrollments row with student_id = 99, and no student with id 99 exists?", diff:"med", type:"mc",
          opts:["The insert succeeds and student_id 99 is treated as a placeholder","The database rejects the insert, since the foreign key constraint requires the referenced value to already exist in Students","The database automatically creates a new student with id 99","The constraint is only checked when the row is later queried, not on insert"],
          ans:1, rationale:"A foreign key constraint's entire purpose is to guarantee referential integrity — every value in the constrained column must correspond to an existing row in the referenced table. The database checks this at insert time and rejects any value that doesn't have a match.",
          misconception:"Assuming foreign key relationships are advisory or checked only later — a declared foreign key constraint is actively enforced at the moment of insert or update, not just a documentation convention." },
        { stem:"A CHECK constraint is added to a salary column requiring salary > 0. What happens if an INSERT tries to set salary to -500?", diff:"med", type:"mc",
          opts:["The insert succeeds, and the negative value is stored as-is","The database rejects the insert, since it violates the CHECK constraint's rule that salary must be greater than 0","The value is automatically converted to 500","CHECK constraints only apply to UPDATE, not INSERT"],
          ans:1, rationale:"A CHECK constraint defines a rule that every row must satisfy, enforced on both INSERT and UPDATE. A value that violates it — a negative salary against a rule requiring salary > 0 — is rejected outright rather than silently stored or corrected.",
          misconception:"Assuming constraints like CHECK only apply to updates on existing rows rather than to new rows being inserted — they apply to any operation that would leave a row violating the rule." },
        { stem:"A foreign key constraint is defined with ON DELETE CASCADE. What happens when the referenced row in the parent table is deleted?", diff:"hard", type:"mc",
          opts:["Nothing happens to the related child rows; they're left pointing at a deleted row","All child rows referencing that parent row are automatically deleted as well, keeping the two tables consistent","The delete on the parent row is blocked entirely","The child rows are updated to reference a random other parent row"],
          ans:1, rationale:"ON DELETE CASCADE tells the database to automatically delete any dependent rows in the child table when their referenced parent row is deleted — deleting a student would automatically delete all of that student's enrollment rows too, rather than leaving orphaned references behind.",
          misconception:"Assuming a deleted parent row simply leaves child rows with a dangling, unmatched reference by default — without CASCADE, most databases actually block the delete entirely rather than allow orphaned foreign keys; CASCADE is what enables the automatic cleanup instead." },
