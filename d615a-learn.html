--------------------------------------------------------- */
function renderPills(){
  const row = document.getElementById('pillRow');
  row.innerHTML = '';
  Object.keys(CURRICULUM).forEach(key=>{
    const d = CURRICULUM[key];
    const p = document.createElement('div');
    p.className = 'pill' + (key===currentSec ? ' active':'');
    p.style.setProperty('--dot', d.color);
    p.innerHTML = `<span class="dot"></span>${d.short}`;
    p.onclick = ()=>{ currentSec = key; currentTopicIdx = 0; renderAll(); };
    row.appendChild(p);
  });
  const mixP = document.createElement('div');
  mixP.className = 'pill' + (currentSec==='mix' ? ' active':'');
  mixP.style.setProperty('--dot', 'var(--mix)');
  mixP.innerHTML = `<span class="dot"></span>Mixed Review`;
  mixP.onclick = ()=>{ currentSec = 'mix'; if(mixedSet.length===0) drawMixedSet(); renderAll(); };
  row.appendChild(mixP);
}

function renderSecNav(){
  const nav = document.getElementById('secNav');
  nav.innerHTML = '';
  Object.keys(CURRICULUM).forEach(key=>{
    const d = CURRICULUM[key];
    const done = d.topics.filter(t=>STATE.reviewed[t.id]).length;
    const btn = document.createElement('div');
    btn.className = 'secbtn' + (key===currentSec ? ' on':'');
    btn.style.setProperty('--dot', d.color);
    btn.innerHTML = `<div class="t">${d.name}</div><div class="s">${done}/${d.topics.length} topics reviewed</div>`;
    btn.onclick = ()=>{ currentSec = key; currentTopicIdx = 0; renderAll(); };
    nav.appendChild(btn);
  });
  const mixBtn = document.createElement('div');
  mixBtn.className = 'secbtn' + (currentSec==='mix' ? ' on':'');
  mixBtn.style.setProperty('--dot', 'var(--mix)');
  mixBtn.innerHTML = `<div class="t">Mixed Review</div><div class="s">${MIX_SIZE} random questions, all competencies</div>`;
  mixBtn.onclick = ()=>{ currentSec = 'mix'; if(mixedSet.length===0) drawMixedSet(); renderAll(); };
  nav.appendChild(mixBtn);
}

function renderTabs(){
  const row = document.getElementById('tabRow');
  row.innerHTML = '';
  if(currentSec==='mix'){ row.style.display='none'; return; }
  row.style.display='flex';
  allTopics().forEach((t,i)=>{
    const tab = document.createElement('div');
    const done = STATE.reviewed[t.id];
    tab.className = 'tab' + (i===currentTopicIdx ? ' on':'') + (done ? ' done':'');
    tab.textContent = (done?'✓ ':'') + t.title;
    tab.onclick = ()=>{ currentTopicIdx = i; renderAll(); };
    row.appendChild(tab);
  });
}

function computeStats(){
  let totalChecks=0, correctChecks=0, attemptedChecks=0, topicsReviewed=0, totalTopics=0, exercisesDone=0, totalExercises=0;
  Object.values(CURRICULUM).forEach(sec=>{
    sec.topics.forEach(t=>{
      totalTopics++; totalExercises++;
      if(STATE.reviewed[t.id]) topicsReviewed++;
      if(STATE.exOK[t.id]) exercisesDone++;
      t.checks.forEach((c,ci)=>{
        totalChecks++;
        const arr = STATE.checks[t.id];
        if(arr && arr[ci]!==undefined){
          attemptedChecks++;
          if(arr[ci]===true) correctChecks++;
        }
      });
    });
  });
  return {totalChecks, correctChecks, attemptedChecks, topicsReviewed, totalTopics, exercisesDone, totalExercises};
}

function renderScoreboard(){
  const s = computeStats();
  const acc = s.attemptedChecks ? Math.round(100*s.correctChecks/s.attemptedChecks) : 0;
  const board = document.getElementById('scoreboard');
  const cells = [
    {n:s.topicsReviewed+'/'+s.totalTopics, l:'Topics reviewed'},
    {n:s.exercisesDone+'/'+s.totalExercises, l:'Exercises confirmed'},
    {n:s.attemptedChecks+'/'+s.totalChecks, l:'Checks attempted'},
    {n:s.correctChecks, l:'Checks correct'},
    {n:acc+'%', l:'Check accuracy'},
  ];
  board.innerHTML = cells.map(c=>`<div class="stat"><div class="n">${c.n}</div><div class="l">${c.l}</div></div>`).join('');

  const overallPct = Math.round(100 * (s.topicsReviewed) / s.totalTopics);
  document.getElementById('progFill').style.width = overallPct+'%';
  document.getElementById('progPct').textContent = overallPct+'%';
}

/* ---------------------------------------------------------
   RENDER: main topic content
--------------------------------------------------------- */
function esc(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMixedMain(){
  const main = document.getElementById('main');
  document.getElementById('prevBtn').style.display='none';
  document.getElementById('nextBtn').style.display='none';

  let html = `<div class="card">
    <div class="kicker" style="color:var(--mix)">Mixed Review</div>
    <h2>${MIX_SIZE} random questions across C1, C2 & C3</h2>
    <p>Pulled fresh from the full 60-question bank every time you draw a new set — a quick way to check whether something learned in one competency has actually stuck, out of the order it was taught in.</p>
    <div class="exrow"><button class="btn" id="mixShuffleBtn">Shuffle new set</button></div>
  </div>`;

  html += `<div class="card">`;
  mixedSet.forEach((entry,idx)=>{
    const t = entry.topic, qi = entry.qi, q = entry.q;
    const secColor = CURRICULUM[entry.secKey].color;
    html += `<div style="margin-bottom:${idx<mixedSet.length-1?'22px':'0'}">
      <div class="qhead">
        <span class="diff ${q.diff==='easy'?'easy':q.diff==='med'?'med':'hard'}">${q.diff}</span>
        <span class="chip" style="color:${secColor}">${CURRICULUM[entry.secKey].short} · ${t.title}</span>
      </div>
      <div style="font-size:13.5px;font-weight:600;margin-bottom:10px">${q.stem}</div>
      <div id="mopts-${idx}"></div>
      <div id="mfb-${idx}"></div>
    </div>`;
  });
  html += `</div>`;
  main.innerHTML = html;

  mixedSet.forEach((entry,idx)=>{
    const t = entry.topic, qi = entry.qi, q = entry.q;
    const qKey = t.id+'-'+qi;
    const optsDiv = document.getElementById(`mopts-${idx}`);
    const fbDiv = document.getElementById(`mfb-${idx}`);
    const savedSel = (STATE.sels[t.id]||{})[qi];
    const order = getOptionOrder(qKey, q.opts.length);
    order.forEach(oi=>{
      const b = document.createElement('button');
      b.className = 'opt';
      b.textContent = q.opts[oi];
      if(savedSel!==undefined){
        b.disabled = true;
        if(oi===q.ans) b.classList.add('correct');
        else if(oi===savedSel) b.classList.add('wrong');
      }
      b.onclick = ()=>{
        if(!STATE.sels[t.id]) STATE.sels[t.id]={};
        if(!STATE.checks[t.id]) STATE.checks[t.id]=[];
        STATE.sels[t.id][qi]=oi;
        STATE.checks[t.id][qi] = (oi===q.ans);
        renderMixedMain();
        renderScoreboard();
      };
      optsDiv.appendChild(b);
    });
    if(savedSel!==undefined){
      const correctFlag = savedSel===q.ans;
      fbDiv.innerHTML = `
        <div class="feedback rationale"><span class="lbl">Why</span>${q.rationale}</div>
        ${!correctFlag ? `<div class="feedback misconception"><span class="lbl">Common misconception</span>${q.misconception}</div>` : ''}
      `;
    }
  });

  document.getElementById('mixShuffleBtn').onclick = ()=>{
    drawMixedSet();
    renderMixedMain();
    renderScoreboard();
    window.scrollTo({top:0,behavior:'smooth'});
  };
}

function renderMain(){
  if(currentSec==='mix'){ renderMixedMain(); return; }
  document.getElementById('prevBtn').style.display='';
  document.getElementById('nextBtn').style.display='';
  const t = topic();
  const main = document.getElementById('main');
  const secColor = CURRICULUM[currentSec].color;

  let html = '';

  // Teaching card
  html += `<div class="card">
    <div class="kicker" style="color:${secColor}">${CURRICULUM[currentSec].name}</div>
    <h2>${t.title}</h2>
    ${t.teach.map(p=>`<p>${p}</p>`).join('')}
  </div>`;

  // Example card
  html += `<div class="card">
    <div class="examplebox">
      <div class="tag">${t.example.tag}</div>
      <pre class="codebox">${esc(t.example.code)}</pre>
      <p style="margin:0">${t.example.explain}</p>
    </div>
  </div>`;

  // Exercise / grader card
  html += `<div class="card">
    <div class="exwrap">
      <div class="tag">Try it yourself</div>
      <p style="margin:0 0 10px">${t.exercise.prompt}</p>
      ${t.exercise.starter ? `<pre class="codebox">${esc(t.exercise.starter)}</pre>` : ''}
      <div class="exgrid">
        <div>
          <span class="exlabel">Your work / trace</span>
          <textarea id="exLeft" placeholder="Paste your code, trace, or reasoning here"></textarea>
        </div>
        <div>
          <span class="exlabel">Result you got</span>
          <textarea id="exRight" placeholder="Paste the actual output / value here"></textarea>
        </div>
      </div>
      <div class="exrow">
        <button class="btn" id="exCheckBtn">Compare to expected</button>
        <button class="btn ghost" id="exResetBtn">Clear</button>
        <span id="exResult"></span>
      </div>
      <div class="hintbox" id="hintBox" style="display:none"></div>
      <details class="solution">
        <summary>Show worked solution</summary>
        <pre class="codebox">${esc(t.exercise.solution)}</pre>
      </details>
      <div class="concepts">${t.exercise.concepts.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
    </div>
  </div>`;

  // Knowledge check card
  html += `<div class="card"><div class="kicker">Knowledge check</div>`;
  t.checks.forEach((q,qi)=>{
    html += `<div style="margin-bottom:${qi<t.checks.length-1?'22px':'0'}">
      <div class="qhead"><span class="diff ${q.diff==='easy'?'easy':q.diff==='med'?'med':'hard'}">${q.diff}</span></div>
      <div style="font-size:13.5px;font-weight:600;margin-bottom:10px">${q.stem}</div>
      <div id="opts-${t.id}-${qi}"></div>
      <div id="fb-${t.id}-${qi}"></div>
    </div>`;
  });
  html += `</div>`;

  // review row
  const reviewed = !!STATE.reviewed[t.id];
  html += `<div class="revrow">
    <button class="revbtn${reviewed?' done':''}" id="reviewBtn">${reviewed?'✓ Marked reviewed':'Mark topic as reviewed'}</button>
  </div>`;

  main.innerHTML = html;

  // wire up knowledge check options
  t.checks.forEach((q,qi)=>{
    const optsDiv = document.getElementById(`opts-${t.id}-${qi}`);
    const fbDiv = document.getElementById(`fb-${t.id}-${qi}`);
    const savedSel = (STATE.sels[t.id]||{})[qi];
    const order = getOptionOrder(t.id+'-'+qi, q.opts.length);
    order.forEach(oi=>{
      const b = document.createElement('button');
      b.className = 'opt';
      b.textContent = q.opts[oi];
      if(savedSel!==undefined){
        b.disabled = true;
        if(oi===q.ans) b.classList.add('correct');
        else if(oi===savedSel) b.classList.add('wrong');
      }
      b.onclick = ()=>{
        if(!STATE.sels[t.id]) STATE.sels[t.id]={};
        if(!STATE.checks[t.id]) STATE.checks[t.id]=[];
        STATE.sels[t.id][qi]=oi;
        STATE.checks[t.id][qi] = (oi===q.ans);
        renderMain();
        renderScoreboard();
        renderTabs();
      };
      optsDiv.appendChild(b);
    });
    if(savedSel!==undefined){
      const correctFlag = savedSel===q.ans;
      fbDiv.innerHTML = `
        <div class="feedback rationale"><span class="lbl">Why</span>${q.rationale}</div>
        ${!correctFlag ? `<div class="feedback misconception"><span class="lbl">Common misconception</span>${q.misconception}</div>` : ''}
      `;
    }
  });

  // exercise wiring
  document.getElementById('exCheckBtn').onclick = ()=>{
    const right = document.getElementById('exRight').value.trim().toLowerCase();
    const expected = t.exercise.expected.trim().toLowerCase();
    const resultEl = document.getElementById('exResult');
    const hintBox = document.getElementById('hintBox');
    const match = right.length>0 && (right===expected || right.includes(expected));
    if(match){
      resultEl.textContent = '✓ Matches the expected result';
      resultEl.className = 'exresult ok';
      hintBox.style.display='none';
      STATE.exOK[t.id]=true;
      renderScoreboard();
    } else {
      resultEl.textContent = '✗ Not matching yet — check the hint below';
      resultEl.className = 'exresult no';
      hintBox.style.display='block';
      hintBox.innerHTML = `<strong>Hint:</strong> ${t.exercise.hint}`;
    }
  };
  document.getElementById('exResetBtn').onclick = ()=>{
    document.getElementById('exLeft').value='';
    document.getElementById('exRight').value='';
    document.getElementById('exResult').textContent='';
    document.getElementById('hintBox').style.display='none';
  };

  document.getElementById('reviewBtn').onclick = ()=>{
    STATE.reviewed[t.id] = !STATE.reviewed[t.id];
    renderMain(); renderScoreboard(); renderTabs(); renderSecNav();
  };

  document.getElementById('prevBtn').disabled = currentTopicIdx===0;
  document.getElementById('nextBtn').disabled = currentTopicIdx===allTopics().length-1;
}

document.getElementById('prevBtn').onclick = ()=>{ if(currentTopicIdx>0){currentTopicIdx--; renderAll(); window.scrollTo({top:0,behavior:'smooth'});} };
document.getElementById('nextBtn').onclick = ()=>{ if(currentTopicIdx<allTopics().length-1){currentTopicIdx++; renderAll(); window.scrollTo({top:0,behavior:'smooth'});} };

/* ---------------------------------------------------------
   MASTER RENDER
--------------------------------------------------------- */
function renderAll(){
  renderPills();
  renderSecNav();
  renderTabs();
  renderScoreboard();
  renderMain();
}

renderAll();
</script>
